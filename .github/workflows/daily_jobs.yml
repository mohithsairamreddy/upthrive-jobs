name: Daily Job Pipeline

on:
  schedule:
    # 7:00 AM IST = 1:30 AM UTC
    - cron: '30 1 * * *'
  workflow_dispatch:   # allow manual trigger from GitHub Actions UI

jobs:
  scrape-match-email:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install Playwright system dependencies
        run: sudo python -m playwright install-deps chromium

      - name: Install Playwright browsers (Chromium only)
        run: python -m playwright install chromium

      - name: Step 1 — Scrape jobs
        working-directory: backend
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY:         ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY:            ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL:                ${{ secrets.FROM_EMAIL }}
          APP_URL:                   ${{ secrets.APP_URL }}
        run: python cron/scrape_jobs.py

      - name: Step 2 — Match jobs to users
        working-directory: backend
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY:         ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python cron/match_jobs.py

      - name: Step 3 — Send email digests
        working-directory: backend
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY:         ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY:            ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL:                ${{ secrets.FROM_EMAIL }}
          APP_URL:                   ${{ secrets.APP_URL }}
        run: python cron/send_emails.py
